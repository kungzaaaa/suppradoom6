<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดต่อเรา</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" sizes="16x16" href="logo/logo1.png"/>
    <style>
        :root {
            --primary: #4d3328;
            --accent: #ffaf36;
            --bg: #fdfaf8;
            --white: #ffffff;
            --text-dark: #333333;
            --text-light: #666666;
            --shadow: 0 10px 30px rgba(77, 51, 40, 0.08);
        }

        body {
            font-family: "Prompt", sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: linear-gradient(135deg, var(--white) 0%, #f4eee9 100%);
            padding: 80px 20px 60px;
            text-align: center;
            position: relative;
        }
        header h1 {
            font-size: 42px;
            color: var(--primary);
            margin: 0;
            position: relative;
            z-index: 2;
        }
        header p {
            font-size: 18px;
            color: var(--text-light);
            margin-top: 15px;
            position: relative;
            z-index: 2;
        }
        header::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 250px;
            height: 250px;
            background: rgba(181, 138, 33, 0.08);
            border-radius: 50%;
            filter: blur(40px);
            z-index: 1;
        }

        /* --- Main Container --- */
        .container {
            max-width: 1200px;
            margin: -30px auto 100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        /* --- Contact Info Box --- */
        .info-box, .form-box {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(181, 138, 33, 0.1);
        }

        .section-title {
            font-size: 24px;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact-list {
            list-style: none;
            padding: 0;
            margin: 0 0 30px 0;
        }
        .contact-list li {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-light);
        }
        .contact-list i {
            color: var(--accent);
            font-size: 20px;
            margin-top: 3px;
        }

        /* Map */
        .map-container {
            width: 100%;
            height: 250px;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 25px;
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            gap: 15px;
        }
        .social-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 45px;
            height: 45px;
            background-color: #f5f5f5;
            color: var(--primary);
            border-radius: 50%;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.3s ease;
        }
        .social-btn.facebook:hover { background-color: #1877f2; color: white; transform: translateY(-3px); }
        .social-btn.line:hover { background-color: #06c755; color: white; transform: translateY(-3px); }

        /* --- Contact Form --- */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }
        .form-control {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Prompt', sans-serif;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(255, 175, 54, 0.1);
        }
        textarea.form-control {
            height: 150px;
            resize: vertical;
        }
        .submit-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            background-color: #33221a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* --- Floating Buttons --- */
        .float-back {
            position: fixed; bottom: 40px; left: 40px;
            background: var(--primary); color: var(--white);
            padding: 12px 30px; border-radius: 50px;
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; font-weight: 600;
            box-shadow: 0 8px 20px rgba(77, 51, 40, 0.3);
            z-index: 1000; transition: all 0.3s;
        }
        .float-back:hover {
            background: #000; transform: translateX(-8px);
        }

        .float-theme {
            position: fixed; bottom: 40px; right: 40px;
            width: 50px; height: 50px;
            background: #ffffff; color: var(--accent);
            border-radius: 50%; display: flex;
            justify-content: center; align-items: center;
            font-size: 20px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 1000; transition: all 0.3s ease; border: 1px solid #ddd;
        }
        .float-theme:hover { transform: scale(1.1); }

        /* --- Responsive --- */
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; margin-top: 20px; }
            header { padding: 60px 20px 40px; }
            header h1 { font-size: 32px; }
        }
        @media (max-width: 768px) {
            .float-back { bottom: 25px; left: 20px; padding: 10px 24px; font-size: 14px; }
            .float-theme { bottom: 25px; right: 20px; width: 45px; height: 45px; font-size: 16px; }
            .info-box, .form-box { padding: 25px; }
        }

        /* --- Dark Mode --- */
        body.dark-mode { background-color: #121212; color: #e0e0e0; }
        body.dark-mode header { background: #1a1a1a; }
        body.dark-mode header h1, body.dark-mode .section-title, body.dark-mode .form-group label { color: #e0e0e0; }
        body.dark-mode .info-box, body.dark-mode .form-box {
            background-color: #1e1e1e; border-color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        body.dark-mode .contact-list li { color: #aaaaaa; }
        body.dark-mode .form-control { background-color: #2a2a2a; border-color: #444; color: #fff; }
        body.dark-mode .form-control:focus { border-color: var(--accent); }
        body.dark-mode .social-btn { background-color: #2a2a2a; color: var(--accent); }
        body.dark-mode .submit-btn { background-color: var(--accent); color: #000; }
        body.dark-mode .submit-btn:hover { background-color: #e59d30; }
        body.dark-mode .float-back { background-color: #2a2a2a; color: var(--accent); border: 1px solid var(--accent); }
        body.dark-mode .float-back:hover { background-color: var(--accent); color: #121212; }
        body.dark-mode .float-theme { background: #000000; color: #ffdd00; border-color: #333; }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-headset" style="color: var(--accent);"></i> ติดต่อเรา</h1>
        <p>ยินดีต้อนรับสู่ช่องทางการติดต่อ หมู่บ้านซับประดู่</p>

    <div class="container">

            <div class="map-container">

            </div>

            <ul class="contact-list">
                <li>
                    <i class="fa-solid fa-house-chimney"></i>

            <h2 class="section-title" style="margin-top: 40px; font-size: 20px;"><i class="fa-solid fa-share-nodes"></i> โซเชียลมีเดีย</h2>
            <div class="social-icons">

                <a href="https://lin.ee/pGFhtc3M" class="social-btn line" title="LINE Official" target="_blank"><i class="fa-brands fa-line"></i></a>

        <div class="form-box">
            <h2 class="section-title"><i class="fa-solid fa-envelope-open-text"></i> ส่งข้อความถึงเรา</h2>
            <form action="#" method="POST" onsubmit="alert('ระบบฟอร์มพร้อมสำหรับการเชื่อมต่อ Backend ในอนาคตครับ!'); return false;">

    <a href="index.html" class="float-back"><i class="fa-solid fa-arrow-left"></i> กลับ</a>

    <div class="float-theme" id="themeToggle" title="สลับโหมดหน้าจอ">
        <i class="fa-solid fa-moon"></i>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggleBtn = document.getElementById('themeToggle');
            const body = document.body;
            const icon = themeToggleBtn ? themeToggleBtn.querySelector('i') : null;

            if (localStorage.getItem('theme') === 'dark') {
                body.classList.add('dark-mode');
                if(icon) icon.classList.replace('fa-moon', 'fa-sun'); 
            }

            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    body.classList.toggle('dark-mode');
                    if (body.classList.contains('dark-mode')) {
                        localStorage.setItem('theme', 'dark');
                        if(icon) icon.classList.replace('fa-moon', 'fa-sun');
                    } else {
                        localStorage.setItem('theme', 'light');
                        if(icon) icon.classList.replace('fa-sun', 'fa-moon');
                    }
                });
            }
        });
    </script>
</body>
</html>
